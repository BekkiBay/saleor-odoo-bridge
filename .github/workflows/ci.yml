name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  middleware:
    name: middleware (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: middleware
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Type-check (mypy)
        run: mypy src

      - name: Test (pytest)
        run: pytest -q

  odoo-addon:
    name: odoo addon unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pytest
        run: pip install pytest

      # The status mapping is pure Python with no Odoo imports, so it runs
      # without an Odoo runtime. See odoo/addons/saleor_sync/models/fulfillment_status.py
      - name: Test
        run: pytest -q odoo/addons/saleor_sync/tests/

  compose:
    name: docker compose config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate compose file against .env.example
        run: |
          sed 's/replace-with-.*/ci-placeholder-value/' .env.example > .env
          docker compose config --quiet
          echo "compose config OK"
